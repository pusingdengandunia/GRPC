syntax = "proto3";

package lab;
option go_package = "./pb";

service LabService {
  // Unary: Mahasiswa request lingkungan baru
  rpc RequestEnvironment(EnvRequest) returns (EnvResponse);

  // Server-side Streaming: Update progress provisioning
  rpc MonitorProvisioning(ProvisionJob) returns (stream LogUpdate);

  // Client-side Streaming: Agent lapor metrik secara berkala
  rpc ReportMetrics(stream ServerMetric) returns (MetricAck);

  // Unary: Status seluruh agent
  rpc GetLabStatus(Empty) returns (LabStatusResponse);

  // Unary: Hapus environment
  rpc TerminateEnvironment(TerminateRequest) returns (TerminateResponse);
}

message Empty {}

message ActiveJob {
  string job_id = 1;
  string student_id = 2;
  string env_type = 3;
  string purpose = 4;
  string status = 5;
  string start_time = 6;
}

message LabStatusResponse {
  float available_cpu = 1;
  float available_ram = 2;
  repeated ActiveJob active_jobs = 3;
}

message EnvRequest {
  string student_id = 1;
  string env_type = 2;
  string purpose = 3; 
}

message EnvResponse {
  string job_id = 1;
  string message = 2;
}

message ProvisionJob {
  string job_id = 1;
}

message LogUpdate {
  int32 progress = 1;
  string status = 2;
}

message ServerMetric {
  string server_id = 1;
  float cpu_usage = 2;
  float ram_usage = 3;
}

message MetricAck {
  string message = 1;
}
message TerminateRequest {
  string job_id = 1;
}

message TerminateResponse {
  string message = 1;
}
